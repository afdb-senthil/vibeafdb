# Google Cloud Build configuration
# Deploy to Cloud Run with: gcloud builds submit --config cloudbuild.yaml
steps:
  # Build the Docker image with increased resources
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile', '-t', 'gcr.io/$PROJECT_ID/afdb-website:$COMMIT_SHA', '.']
    timeout: '600s'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/afdb-website:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'afdb-website'
      - '--image'
      - 'gcr.io/$PROJECT_ID/afdb-website:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

images:
  - 'gcr.io/$PROJECT_ID/afdb-website:$COMMIT_SHA'

timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'